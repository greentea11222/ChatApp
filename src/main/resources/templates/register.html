<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>会員登録</title>
</head>
<body>
	<h2>会員登録</h2>
	<p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red;"></p>
	
	<!--th:object="${user}"で、Controllerから渡されたUserオブジェクトを使えるようになる-->
	<form th:action="@{/register}" th:object="${user}" method="post"> 
		<div>
			<label>プロフィールアイコン：</label>
			<input type="file" accept="image/*" onchange="previewAndSetIcon(this)">
			<input type="hidden" th:field="*{iconData}" id="iconDataHidden">
			
			<div id="iconPreview" style="margin-top:10px; width: 60px; height: 60px; border-radius: 50%; background: #eee; background-size: cover;"></div>
		</div>
		<div> 
			<label>ユーザー名：</label>
			<input type="text" th:field="*{username}" /> <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color: red;"></p>
		</div>
		<div>
			<label>パスワード：</label>
			<!--th:field="*{password}"で、入力した値が自動的にuser.setName()される-->
			<input type="password" th:field="*{password}" />
			<p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red;"></p>
		</div>
		
		<button type="submit">登録</button>
	</form>
	
	<a th:href="@{/login}">ログイン画面へ</a>
	<script>
		function previewAndSetIcon(input) {
			var file = input.files[0];
			if(file){
				var reader = new FileReader();
				reader.onload = function(e){
					var base64 = e.target.result;
					document.getElementById('iconDataHidden').value = base64;
					document.getElementById('iconPreview').style.backgroundImage = 'url(' + base64 + ')';
				};
				reader.readAsDataURL(file);
			}
		}
	
	</script>
</body>
</html>
